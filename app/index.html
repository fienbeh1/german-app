<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deutsch Learning App</title>
    <style>
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0e14;
        color: #e8e8e8;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        padding: 24px;
        text-align: center;
        z-index: 9999;
      }
      #boot .box {
        max-width: 720px;
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 16px 20px;
      }
      #boot pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 10px 0 0;
        font-size: 12px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="box">
        <div>Loading app...</div>
        <pre id="boot-error"></pre>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
