<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#e0a800" stroke-width="8"/>
  <!-- German flag stripes -->
  <rect x="156" y="160" width="200" height="24" rx="4" fill="#000"/>
  <rect x="156" y="184" width="200" height="24" rx="4" fill="#dd0000"/>
  <rect x="156" y="208" width="200" height="24" rx="4" fill="#ffce00"/>
  <!-- Book icon -->
  <path d="M196 260 h120 v100 q-60-10-120 0 z" fill="#4a90d9" opacity="0.9"/>
  <path d="M196 260 h120 v100 q-60-10-120 0 z" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Play triangle -->
  <polygon points="276,298 276,338 306,318" fill="#4ade80"/>
  <!-- Text -->
  <text x="256" y="410" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e0a800" text-anchor="middle" letter-spacing="4">DEUTSCH</text>
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="16" fill="#888" text-anchor="middle" letter-spacing="2">LERN APP</text>
</svg>
