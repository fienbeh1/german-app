<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deutsch Lernen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm p-4">
    <h1 class="text-xl font-bold">🇩🇪 Deutsch Lernen</h1>
  </header>
  <main class="max-w-6xl mx-auto p-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="courses"></div>
  </main>
  <script>
    const API = 'http://localhost:3456/api';
    fetch(API+'/cursos').then(r=>r.json()).then(cursos=>{
      document.getElementById('courses').innerHTML = cursos.map(c=>`<div class="bg-white p-4 rounded shadow">
        <h2 class="font-bold text-lg">${c.nivel}</h2><p>${c.nombre}</p></div>`).join('');
    });
  </script>
</body>
</html>
